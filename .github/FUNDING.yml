# yaml-language-server: $schema=https://json.schemastore.org/github-funding.json
#
# Кнопка «Sponsor» на странице репозитория.
# https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/displaying-a-sponsor-button-in-your-repository
#
# github — нативная интеграция GitHub Sponsors (после одобрения org cloudcastle-apps).
# custom — дополнительные ссылки в меню кнопки (до 4 URL).

github:
  - cloudcastle-apps

custom:
  - https://github.com/sponsors/cloudcastle-apps
  - https://packagist.org/packages/cloudcastle/di
  - https://github.com/cloudcastle-apps/di/issues
