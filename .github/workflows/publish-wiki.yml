name: Publish wiki

on:
  push:
    branches:
      - main
    paths:
      - wiki/**
      - .github/workflows/publish-wiki.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-wiki
  cancel-in-progress: false

jobs:
  publish-wiki:
    name: Sync wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Publish to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          workdir="$(mktemp -d)"
          cp -a wiki/. "$workdir/"
          cd "$workdir"
          git init -b master
          git add -A
          git commit -m "Sync wiki from repository"

          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          if git push -f "$remote" master; then
            echo "Wiki published."
            exit 0
          fi

          echo "::warning::Wiki git repo not initialized yet. Create the first page in the GitHub UI:"
          echo "https://github.com/${GITHUB_REPOSITORY}/wiki/_new"
          exit 1
