name: Quality

on:
  push:
    branches:
      - main
      - master
    tags:
      - '**'
  pull_request:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'

    env:
      COMPOSER_ALLOW_SUPERUSER: '1'
      COMPOSER_NO_INTERACTION: '1'
      XDEBUG_MODE: coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: zip, yaml
          tools: composer:v2
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: |
            vendor
            ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php-version }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-ansi --ignore-platform-reqs

      - name: PHP version
        run: php -v

      - name: Meta checks
        run: composer ci:meta

      - name: Linters
        run: composer ci:linters

      - name: Static analysis
        run: composer ci:static-analysis

      - name: Tests unit
        run: composer test:unit

      - name: Tests integration
        run: composer test:integration

      - name: Tests security
        run: composer test:security

      - name: Tests load
        run: composer test:load

      - name: Tests performance
        env:
          XDEBUG_MODE: off
        run: composer test:performance

      - name: Benchmark regression check
        run: composer benchmark-check

      - name: Benchmark reports (artifacts)
        run: composer benchmark-report

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports-php-${{ matrix.php-version }}
          path: var/benchmark/
          if-no-files-found: error

      - name: Tests coverage
        run: composer test:coverage

      - name: Tests mutation
        env:
          XDEBUG_MODE: off
        run: |
          rm -rf var/cache/phpunit var/cache/infection
          composer test:mutation

      - name: Upload Infection report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: infection-php-${{ matrix.php-version }}
          path: var/infection/
          if-no-files-found: ignore

      - name: Documentation
        run: composer docs:check
