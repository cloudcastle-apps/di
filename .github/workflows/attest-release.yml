name: Attest release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: attest-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  attest:
    name: Build provenance
    runs-on: ubuntu-latest

    env:
      COMPOSER_ALLOW_SUPERUSER: '1'
      COMPOSER_NO_INTERACTION: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Build distribution archive
        run: |
          mkdir -p dist
          composer archive --format=zip --file=dist/cloudcastle-di
          ls -la dist/

      - name: Generate build provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: '${{ github.workspace }}/dist/cloudcastle-di.zip'
