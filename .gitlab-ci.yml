stages:
  - quality

variables:
  COMPOSER_ALLOW_SUPERUSER: "1"
  COMPOSER_CACHE_DIR: "$CI_PROJECT_DIR/.composer-cache"
  COMPOSER_NO_INTERACTION: "1"

.default-php-quality:
  stage: quality
  image: php:${PHP_VERSION}-cli
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends git unzip zip libzip-dev $PHPIZE_DEPS
    - pecl install pcov yaml
    - docker-php-ext-enable pcov yaml
    - docker-php-ext-install -j"$(nproc)" zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --prefer-dist --no-progress --no-ansi --ignore-platform-reqs
  cache:
    key:
      files:
        - composer.lock
      prefix: "${CI_COMMIT_REF_SLUG}-php-${PHP_VERSION}"
    paths:
      - vendor/
      - .composer-cache/
    policy: pull-push
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

quality:
  extends: .default-php-quality
  parallel:
    matrix:
      - PHP_VERSION: "8.1"
      - PHP_VERSION: "8.2"
      - PHP_VERSION: "8.3"
      - PHP_VERSION: "8.4"
      - PHP_VERSION: "8.5"
  script:
    - php -v
    - echo "=== Meta ==="
    - composer ci:meta
    - echo "=== Linters ==="
    - composer ci:linters
    - echo "=== Static analysis ==="
    - composer ci:static-analysis
    - echo "=== Tests: unit ==="
    - composer test:unit
    - echo "=== Tests: integration ==="
    - composer test:integration
    - echo "=== Tests: security ==="
    - composer test:security
    - echo "=== Tests: load ==="
    - composer test:load
    - echo "=== Tests: performance ==="
    - composer test:performance
    - echo "=== Benchmark regression check ==="
    - composer benchmark-check
    - echo "=== Tests: coverage ==="
    - composer test:coverage
    - echo "=== Tests: mutation ==="
    - XDEBUG_MODE=off composer test:mutation
    - echo "=== Documentation ==="
    - composer docs:check
